<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日常相簿 | Photo Album</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- 引入 Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        apple: { gray: '#f5f5f7', dark: '#1d1d1f', blue: '#0066cc' }
                    }
                }
            }
        }
    </script>

    <style>
        html { scroll-behavior: smooth; }
        body {
            background-color: #ffffff;
            color: #1d1d1f;
            -webkit-font-smoothing: antialiased;
        }

        .fluid-transition {
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* 毛玻璃頂部導覽列 */
        .glass-nav {
            background-color: rgba(255, 255, 255, 0.85);
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
        }

        /* 滾動淡入動畫 */
        .animate-on-scroll {
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1), transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            will-change: opacity, transform;
        }
        .animate-on-scroll.is-visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* 瀑布流單個相片容器設定 */
        .masonry-item {
            break-inside: avoid;
            margin-bottom: 1rem;
            position: relative;
            overflow: hidden;
            border-radius: 0.75rem;
            cursor: zoom-in;
            background-color: #f5f5f7;
            /* 預設隱藏，等待圖片載入完成才顯示 */
            opacity: 0;
            transform: scale(0.95);
            transition: opacity 0.6s ease, transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .masonry-item.loaded {
            opacity: 1;
            transform: scale(1);
        }
        .masonry-item img {
            width: 100%;
            height: auto;
            display: block;
            transition: transform 0.7s cubic-bezier(0.16, 1, 0.3, 1), filter 0.4s ease;
            will-change: transform;
        }
        .masonry-item:hover img {
            transform: scale(1.03);
            filter: brightness(0.95);
        }

        /* 全螢幕燈箱 (Lightbox) 樣式 */
        #lightbox {
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        #lightbox.active {
            opacity: 1;
            visibility: visible;
        }
        #lightbox img {
            transform: scale(0.95);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        #lightbox.active img {
            transform: scale(1);
        }
        
        /* 載入中指示器 */
        #loading-indicator {
            display: flex;
            justify-content: center;
            padding: 2rem 0;
            color: #94a3b8;
        }
    </style>
</head>

<body class="font-sans antialiased selection:bg-apple-blue selection:text-white pb-24">

    <!-- 導覽列 -->
    <nav class="fixed top-0 w-full z-40 glass-nav border-b border-gray-100">
        <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-14 text-xs font-medium text-gray-800 tracking-wide">
                <a href="../private_index.html" class="inline-flex items-center gap-1.5 text-apple-blue hover:opacity-70 fluid-transition">
                    <i class="ph ph-caret-left text-base"></i> Back to Albums
                </a>
                <span class="text-apple-dark font-semibold truncate hidden sm:block">日常相簿</span>
                <!-- 照片數量將由 JavaScript 動態計算並填入 -->
                <span id="photo-count-display" class="text-gray-400 font-light">Loading...</span>
            </div>
        </div>
    </nav>

    <!-- 相簿標題區塊 -->
    <header class="pt-32 pb-10 px-4 sm:px-6 lg:px-8 max-w-6xl mx-auto">
        <div class="animate-on-scroll">
            <h1 class="text-3xl md:text-5xl font-bold tracking-tight text-apple-dark mb-4">
                日常相簿
            </h1>
            <p class="text-base text-gray-600 font-light max-w-2xl leading-relaxed">
                這些照片記錄了日常生活中的點滴，多希望永遠停留在那一刻。
            </p>
        </div>
    </header>

    <!-- 畫廊容器 -->
    <main class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
        <div id="gallery-container" class="columns-2 md:columns-3 lg:columns-4 gap-4 space-y-4">
            <!-- JavaScript 會把成功載入的照片動態塞在這裡 -->
        </div>
        <div id="loading-indicator">
            <i class="ph ph-spinner-gap animate-spin text-2xl"></i>
        </div>
    </main>

    <!-- 燈箱 (Lightbox) 結構 -->
    <div id="lightbox" class="fixed inset-0 z-50 bg-black/90 flex items-center justify-center p-4 sm:p-8 cursor-zoom-out">
        <button id="lightbox-close" class="absolute top-6 right-6 text-white/70 hover:text-white bg-black/50 hover:bg-black/80 rounded-full p-2 fluid-transition z-[60]">
            <i class="ph ph-x text-xl"></i>
        </button>
        <img id="lightbox-img" src="" alt="Enlarged Photo" class="max-w-full max-h-full object-contain rounded-md shadow-2xl">
        <p id="lightbox-caption" class="absolute bottom-6 left-0 w-full text-center text-white/80 text-sm font-light tracking-wide"></p>
    </div>

    <!-- 負責處理動態生成與互動邏輯的 JavaScript -->
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            
            // ==========================================
            // 💡 循序探測演算法 (Sequential Fetching Algorithm)
            // ==========================================
            // 目標資料夾設定
            const IMAGE_FOLDER = '../../img/life/'; // 照片資料夾路徑
            const IMAGE_EXTENSION = '.jpg'; // 若你的照片都是 .png，請改為 .png
            
            const galleryContainer = document.getElementById('gallery-container');
            const countDisplay = document.getElementById('photo-count-display');
            const loadingIndicator = document.getElementById('loading-indicator');
            
            let currentIndex = 1;
            let loadedCount = 0;
            // 容錯機制：允許中間空缺多少個數字才判定為到底
            let consecutiveErrors = 0; 
            const MAX_ERRORS = 3; 

            // 綁定燈箱事件
            const bindLightboxEvents = (imgElement, index) => {
                imgElement.addEventListener('click', (e) => {
                    const src = e.target.getAttribute('src');
                    const lightboxImg = document.getElementById('lightbox-img');
                    lightboxImg.setAttribute('src', src);
                    document.getElementById('lightbox-caption').textContent = `Photo ${index}`;
                    
                    document.getElementById('lightbox').classList.add('active');
                    document.body.style.overflow = 'hidden';
                });
            };

            // 核心載入函數 (遞迴載入)
            function tryLoadNextImage() {
                const imgPath = `${IMAGE_FOLDER}${currentIndex}${IMAGE_EXTENSION}`;
                const img = new Image();
                
                // 成功載入 (File exists)
                img.onload = () => {
                    consecutiveErrors = 0; // 重置錯誤計數
                    loadedCount++;

                    // 建立 DOM 元素
                    const div = document.createElement('div');
                    div.className = 'masonry-item';
                    
                    const displayImg = document.createElement('img');
                    displayImg.src = imgPath;
                    displayImg.alt = `Photo ${currentIndex}`;
                    displayImg.className = 'gallery-img cursor-zoom-in';
                    
                    bindLightboxEvents(displayImg, currentIndex);
                    
                    div.appendChild(displayImg);
                    galleryContainer.appendChild(div);

                    // 觸發淡入動畫 (稍微延遲確保 DOM 已渲染)
                    requestAnimationFrame(() => {
                        div.classList.add('loaded');
                    });

                    countDisplay.textContent = `Loading... (${loadedCount})`;
                    
                    currentIndex++;
                    tryLoadNextImage(); // 繼續載入下一張
                };
                
                // 載入失敗 (File not found, Error 404)
                img.onerror = () => {
                    consecutiveErrors++;
                    if (consecutiveErrors < MAX_ERRORS) {
                        // 容錯範圍內，跳過這個數字繼續往下找
                        currentIndex++;
                        tryLoadNextImage();
                    } else {
                        // 連續找不到檔案，判定相簿到底，結束載入
                        loadingIndicator.style.display = 'none';
                        countDisplay.textContent = `${loadedCount} Photos`;
                        
                        // 如果一張都沒找到，顯示提示
                        if (loadedCount === 0) {
                            galleryContainer.innerHTML = `
                                <div class="col-span-full text-center py-10 text-gray-400 border-2 border-dashed border-gray-200 rounded-xl">
                                    找不到相片。請確認照片已放入 <code>img/</code> 資料夾，並命名為 <code>1.jpg</code>, <code>2.jpg</code>...
                                </div>
                            `;
                        }
                    }
                };

                // 設定 src 以觸發載入
                img.src = imgPath;
            }

            // 啟動遞迴載入
            tryLoadNextImage();

            // ==========================================
            // 燈箱 (Lightbox) 關閉邏輯
            // ==========================================
            const lightbox = document.getElementById('lightbox');
            const closeLightbox = () => {
                lightbox.classList.remove('active');
                document.body.style.overflow = 'auto';
                setTimeout(() => {
                    if (!lightbox.classList.contains('active')) {
                        document.getElementById('lightbox-img').setAttribute('src', '');
                    }
                }, 300); // 等待動畫結束後清空 src
            };

            lightbox.addEventListener('click', closeLightbox);
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && lightbox.classList.contains('active')) {
                    closeLightbox();
                }
            });

            // 初始標題滾動動畫綁定
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) entry.target.classList.add('is-visible');
                });
            }, { root: null, rootMargin: '0px', threshold: 0.1 });
            document.querySelectorAll('.animate-on-scroll').forEach(el => observer.observe(el));
        });
    </script>
</body>
</html>
